components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [account, password]
      properties:
        account:
          type: string
          description: 登录账号（user.account）
          example: admin
        password:
          type: string
          description: 登录密码（明文；后端 BCrypt 验证）
          example: admin
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: Refresh Token（JWT）
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          nullable: true
          description: 可选；同时吊销该 Refresh Token（JWT）
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    RegisterRequest:
      type: object
      required: [account, email, password]
      properties:
        account:
          type: string
          description: 登录账号（user.account）
          example: user001
        email:
          type: string
          format: email
          description: 登录邮箱（user.email）
          example: user001@example.com
        password:
          type: string
          description: 登录密码（明文；后端 BCrypt 哈希存储）
          example: 123456
        nickname:
          type: string
          nullable: true
          description: 昵称（为空则默认使用 account）
          example: 小明
    RegisterResponse:
      type: object
      required: [userId, account, email, nickname]
      properties:
        userId:
          type: integer
          format: int64
          description: 用户 ID（user.id）
          example: 2
        account:
          type: string
          example: user001
        email:
          type: string
          format: email
          example: user001@example.com
        nickname:
          type: string
          example: 小明
    TokenResponse:
      type: object
      required:
        - tokenType
        - accessToken
        - accessExpiresIn
        - refreshToken
        - refreshExpiresIn
        - userId
        - role
        - weight
      properties:
        tokenType:
          type: string
          description: 固定为 Bearer
          example: Bearer
        accessToken:
          type: string
          description: Access Token（2 小时）
        accessExpiresIn:
          type: integer
          format: int32
          description: Access Token 有效期（秒）
          example: 7200
        refreshToken:
          type: string
          description: Refresh Token（15 天）
        refreshExpiresIn:
          type: integer
          format: int32
          description: Refresh Token 有效期（秒）
          example: 1296000
        userId:
          type: integer
          format: int64
          description: 用户 ID（user.id）
          example: 1
        role:
          type: string
          description: 角色（USER / ADMIN / SUPER_ADMIN）
          enum: [USER, ADMIN, SUPER_ADMIN]
          example: SUPER_ADMIN
        weight:
          type: integer
          format: int32
          description: 权限权重（数值越大权限越高）
          example: 1000
    ApiResponseTokenResponse:
      type: object
      required: [code, message, data]
      properties:
        code:
          type: integer
          format: int32
          description: 0=成功；非0=失败
          example: 0
        message:
          type: string
          example: ok
        data:
          $ref: '#/components/schemas/TokenResponse'
    ApiResponseVoid:
      type: object
      required: [code, message, data]
      properties:
        code:
          type: integer
          format: int32
          description: 0=成功；非0=失败
          example: 0
        message:
          type: string
          example: ok
        data:
          nullable: true
    ApiResponseRegisterResponse:
      type: object
      required: [code, message, data]
      properties:
        code:
          type: integer
          format: int32
          description: 0=成功；非0=失败
          example: 0
        message:
          type: string
          example: ok
        data:
          $ref: '#/components/schemas/RegisterResponse'
    ApiResponseError:
      type: object
      required: [code, message, data]
      properties:
        code:
          type: integer
          format: int32
          description: 业务错误码（例如 1000 参数不合法、1001 未授权、1002 无权限、2000 账号不存在 等）
          example: 1001
        message:
          type: string
          description: 错误信息
          example: 未登录或令牌无效
        data:
          nullable: true
    BanSingleRequest:
      type: object
      required: [value]
      properties:
        value:
          type: string
          description: 封禁目标值（IP 或 邮箱）
        reason:
          type: string
          nullable: true
          description: 封禁原因
        durationSeconds:
          type: integer
          format: int64
          nullable: true
          description: 封禁时长（秒；NULL 表示永久）
          example: 86400
    BanBatchRequest:
      type: object
      required: [values, confirm]
      properties:
        values:
          type: array
          items:
            type: string
          description: 批量封禁目标列表（IP 或 邮箱）
        reason:
          type: string
          nullable: true
        durationSeconds:
          type: integer
          format: int64
          nullable: true
          description: 封禁时长（秒；NULL 表示永久）
        confirm:
          type: boolean
          description: 二次确认开关（必须为 true）
          example: true
    BanUserRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer
          format: int64
          description: 用户ID（user.id）
          example: 1
        reason:
          type: string
          nullable: true
          description: 封禁原因
        durationSeconds:
          type: integer
          format: int64
          nullable: true
          description: 封禁时长（秒；NULL 表示永久）
          example: 86400
    BanUserBatchRequest:
      type: object
      required: [userIds, confirm]
      properties:
        userIds:
          type: array
          items:
            type: integer
            format: int64
          description: 批量封禁用户ID列表（user.id）
        reason:
          type: string
          nullable: true
        durationSeconds:
          type: integer
          format: int64
          nullable: true
          description: 封禁时长（秒；NULL 表示永久）
        confirm:
          type: boolean
          description: 二次确认开关（必须为 true）
          example: true
    UnbanRequest:
      type: object
      required: [recordId]
      properties:
        recordId:
          type: integer
          format: int64
          description: 封禁记录ID
          example: 1
    BanRecord:
      type: object
      required: [id, targetType, targetValue, adminId, effectiveAt, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: int64
        targetType:
          type: string
          enum: [IP, EMAIL, USER]
        targetValue:
          type: string
        bannedUserId:
          type: integer
          format: int64
          nullable: true
        adminId:
          type: integer
          format: int64
        reason:
          type: string
          nullable: true
        durationSeconds:
          type: integer
          format: int64
          nullable: true
        effectiveAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [ACTIVE, EXPIRED, REVOKED]
        unbannedAt:
          type: string
          format: date-time
          nullable: true
        unbannedBy:
          type: integer
          format: int64
          nullable: true
        unbanType:
          type: string
          enum: [AUTO, MANUAL]
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PageBanRecord:
      type: object
      required: [total, page, size, items]
      properties:
        total:
          type: integer
          format: int64
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        items:
          type: array
