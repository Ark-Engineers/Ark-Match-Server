openapi: 3.0.3
info:
  title: dateOrFriends API
  version: 0.0.1-SNAPSHOT
  description: |
    dateOrFriends 后端接口文档（可直接导入 Apifox：导入 -> OpenAPI）。

    统一返回结构：{ code, message, data }
servers:
  - url: http://localhost:8888
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: 认证接口（管理员/用户共用）
  - name: User
    description: 用户端接口
  - name: Admin
    description: 管理端接口（需要 ADMIN 角色）
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: 登录
      description: 统一登录入口（管理员/普通用户共用），成功后签发 Access/Refresh 双令牌
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              admin:
                value:
                  account: admin
                  password: admin
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTokenResponse'
        '400':
          description: 参数不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /auth/register:
    post:
      tags: [Auth]
      summary: 注册
      description: 用户注册（公共接口，无需登录），创建普通用户账号（role=USER，密码以 BCrypt 哈希存储）
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseRegisterResponse'
        '400':
          description: 参数不合法 / 账号或邮箱已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /auth/refresh:
    post:
      tags: [Auth]
      summary: 刷新令牌
      description: 仅 Refresh Token 可用；刷新后旧 Refresh 立即作废（Redis + 黑名单）
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseTokenResponse'
        '400':
          description: 参数不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /auth/logout:
    post:
      tags: [Auth]
      summary: 登出
      description: 主动吊销当前 Access Token；可选携带 refreshToken 以同时吊销该 Refresh Token
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /auth/logout-all:
    post:
      tags: [Auth]
      summary: 登出全部
      description: 吊销该用户全部端的 Access/Refresh（tokenVersion 机制使历史令牌即时失效）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /user/ping:
    get:
      tags: [User]
      summary: 用户端连通性探针
      description: 需要登录（Bearer Access Token）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            text/plain:
              schema:
                type: string
              examples:
                ok:
                  value: pong(user)
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /user/ban/records:
    get:
      tags: [User]
      summary: 查询我的封禁记录
      description: 仅返回当前登录用户（bannedUserId=token.userId）的封禁记录；禁止跨用户查询
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [ACTIVE, EXPIRED, REVOKED]
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePageUserBanRecord'
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /admin/ping:
    get:
      tags: [Admin]
      summary: 管理端连通性探针
      description: 需要登录且必须为 ADMIN 角色（/admin/** 强制 ADMIN）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            text/plain:
              schema:
                type: string
              examples:
                ok:
                  value: pong(admin)
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '403':
          description: 无权限（非 ADMIN）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /admin/auth/revoke/{userId}:
    post:
      tags: [Admin]
      summary: 吊销指定用户全部令牌
      description: 管理员接口：吊销指定 userId 的全部 Access/Refresh（tokenVersion + refresh set 清理）
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: 用户 ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '403':
          description: 无权限（非 ADMIN）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /admin/ban/ip:
    post:
      tags: [Admin]
      summary: 封禁IP（单个）
      description: 对指定 IP 进行封禁；被封禁 IP 无法登录/注册/访问任何接口
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BanSingleRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBanRecord'
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '403':
          description: 无权限（非 ADMIN / 白名单禁止封禁）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '400':
          description: 参数不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /admin/ban/ip/batch:
    post:
      tags: [Admin]
      summary: 封禁IP（批量）
      description: 批量封禁 IP；必须 confirm=true（二次确认）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BanBatchRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBanRecordList'
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '403':
          description: 无权限（非 ADMIN / 白名单禁止封禁）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '400':
          description: 参数不合法 / confirm=false
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /admin/ban/email:
    post:
      tags: [Admin]
      summary: 封禁邮箱（单个）
      description: 对指定邮箱进行封禁；封禁后该邮箱无法登录/注册；如已存在账号将强制下线
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BanSingleRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBanRecord'
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '403':
          description: 无权限（非 ADMIN / 白名单禁止封禁）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '400':
          description: 参数不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /admin/ban/email/batch:
    post:
      tags: [Admin]
      summary: 封禁邮箱（批量）
      description: 批量封禁邮箱；必须 confirm=true（二次确认）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BanBatchRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBanRecordList'
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '403':
          description: 无权限（非 ADMIN / 白名单禁止封禁）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '400':
          description: 参数不合法 / confirm=false
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /admin/ban/user:
    post:
      tags: [Admin]
      summary: 封禁用户（按 userId）
      description: 对指定 userId 的账号进行封禁；封禁后该账号无法访问任何受保护资源（并强制下线），登录/刷新也会被拦截
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BanUserRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBanRecord'
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '403':
          description: 无权限（非 ADMIN / 白名单禁止封禁）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '400':
          description: 参数不合法 / 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /admin/ban/user/batch:
    post:
      tags: [Admin]
      summary: 封禁用户（批量）
      description: 批量封禁 userId；必须 confirm=true（二次确认）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BanUserBatchRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBanRecordList'
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '403':
          description: 无权限（非 ADMIN / 白名单禁止封禁）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '400':
          description: 参数不合法 / confirm=false
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /admin/ban/unban:
    post:
      tags: [Admin]
      summary: 解封（手动）
      description: 根据封禁记录ID手动解封；记录状态更新为 REVOKED
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnbanRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBanRecord'
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '403':
          description: 无权限（非 ADMIN）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '400':
          description: 参数不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /admin/ban/records:
    get:
      tags: [Admin]
      summary: 封禁记录查询
      description: 支持按 IP/邮箱/状态/管理员ID/时间范围筛选；targetValue 为模糊匹配；分页返回
      security:
        - bearerAuth: []
      parameters:
        - name: targetType
          in: query
          required: false
          schema:
            type: string
            enum: [IP, EMAIL, USER]
        - name: targetValue
          in: query
          required: false
          description: 目标值（模糊匹配）
          schema:
            type: string
        - name: bannedUserId
          in: query
          required: false
          description: 被封禁的用户ID（用于封禁记录追溯；IP/EMAIL 可能为空）
          schema:
            type: integer
            format: int64
        - name: keyword
          in: query
          required: false
          description: 关键词全文搜索（目标/原因）
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [ACTIVE, EXPIRED, REVOKED]
        - name: adminId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: effectiveFrom
          in: query
          required: false
          description: 生效时间起（ISO_LOCAL_DATE_TIME，例如 2026-05-22T10:00:00）
          schema:
            type: string
        - name: effectiveTo
          in: query
          required: false
          description: 生效时间止（ISO_LOCAL_DATE_TIME）
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePageBanRecord'
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '403':
          description: 无权限（非 ADMIN）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /admin/ban/records/export:
    get:
      tags: [Admin]
      summary: 导出封禁记录CSV
      description: 返回 CSV 文件（UTF-8）；参数同 records 查询
      security:
        - bearerAuth: []
      parameters:
        - name: targetType
          in: query
          required: false
          schema:
            type: string
            enum: [IP, EMAIL, USER]
        - name: targetValue
          in: query
          required: false
          schema:
            type: string
        - name: bannedUserId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: keyword
          in: query
          required: false
          schema:
            type: string
        - name: ids
          in: query
          required: false
          description: 选中记录ID列表（逗号分隔；传此参数时忽略其他筛选条件）
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [ACTIVE, EXPIRED, REVOKED]
        - name: adminId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: effectiveFrom
          in: query
          required: false
          schema:
            type: string
        - name: effectiveTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 成功（CSV）
          content:
            text/csv:
              schema:
                type: string
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '403':
          description: 无权限（非 ADMIN）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /admin/ban/records/{id}:
    get:
      tags: [Admin]
      summary: 封禁记录详情
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBanRecord'
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '403':
          description: 无权限（非 ADMIN）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '400':
          description: 参数不合法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /admin/ban/logs:
    get:
      tags: [Admin]
      summary: 封禁操作日志查询
      description: 只读追加日志；支持按 recordId/actorId/actionType/时间范围筛选；分页返回
      security:
        - bearerAuth: []
      parameters:
        - name: recordId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: actorId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: actionType
          in: query
          required: false
          schema:
            type: string
            enum: [BAN, UNBAN_MANUAL, UNBAN_AUTO]
        - name: fromTime
          in: query
          required: false
          schema:
            type: string
        - name: toTime
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePageBanOperationLog'
        '401':
          description: 未登录或令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '403':
          description: 无权限（非 ADMIN）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
  /admin/ban/check/ip:
    get:
      tags: [Admin]
      summary: 查询IP是否封禁
      description: 返回 true=已封禁；false=未封禁
      security:
        - bearerAuth: []
      parameters:
        - name: value
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBoolean'
  /admin/ban/check/email:
    get:
      tags: [Admin]
      summary: 查询邮箱是否封禁
      description: 返回 true=已封禁；false=未封禁
      security:
        - bearerAuth: []
      parameters:
        - name: value
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBoolean'
  /admin/user/search:
    get:
      tags: [Admin]
      summary: 用户信息查询
