spring:
  config:
    activate:
      # 开发环境 profile
      on-profile: dev
  datasource:
    # 数据库连接（开发环境）
    # 强烈建议不要把真实账号/密码提交到仓库：
    # - 本地开发可直接填明文（仅限本机、不提交）
    # - 更推荐改为环境变量形式：password: ${DB_PASSWORD:}
    url: ${DB_URL:jdbc:mysql://i.leningcloud.com:3306/ark_match?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ark_match
    password: ark123

  data:
    redis:
      # Redis（图形验证码 / 邮箱验证码 / token 黑名单等依赖）
      # 强烈建议不要把真实密码提交到仓库：
      # - 本地开发可直接填明文（仅限本机、不提交）
      # - 更推荐改为环境变量形式：password: ${REDIS_PASSWORD:}
      host: i.leningcloud.com
      port: 6379
      password: shengda

  mail:
    # 邮件发送（邮箱验证码依赖）
    # 推荐使用 163 的“客户端授权码”，不要把登录密码写进配置文件
    # 强烈建议不要把真实账号/授权码提交到仓库：
    # - 本地开发可直接填明文（仅限本机、不提交）
    # - 更推荐改为环境变量形式：
    #   username: ${MAIL_USERNAME:}
    #   password: ${MAIL_PASSWORD:}
    host: smtp.163.com
    port: 465
    username: z3056361350@163.com
    password: HUiWrHVXw4xuEkAP
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true

server:
  # 开发环境默认端口（本地启动用）
  port: 8888

logging:
  level:
    root: INFO
    # 开发环境建议开启项目包 DEBUG，方便排查问题
    io.arknights: DEBUG

mybatis:
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-jwt-secret-change-me}
    issuer: ${JWT_ISSUER:dateOrFriends}
    access-ttl-seconds: 7200
    refresh-ttl-seconds: 1296000
  security:
    login-fail-lock-threshold: 5
    login-fail-lock-minutes: 15
    ban:
      min-admin-weight: 100
      whitelist-ips:
        - 127.0.0.1
        - ::1
      whitelist-emails:
        - admin@admin.com
      expire-sweep-fixed-delay-ms: 60000
      sync-active-bans-fixed-delay-ms: 300000
  admin:
    bootstrap:
      super-account: superadmin
      super-password: 123456
      super-email: superadmin@example.com
      super-nickname: 超级管理员

      admin-account: admin
      admin-password: 123456
      admin-email: admin@example.com
      admin-nickname: 管理员
